<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; media-src media:;" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'; media-src media:;" />
    <title>Retro Player</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="player-container">
      <div id="drag-bar"></div>
      <div id="player-screen">
        <span id="screen-text">Nenhuma faixa selecionada</span>
      </div>
      <svg class="player-controls" viewBox="0 0 711 219" xmlns="http://www.w3.org/2000/svg">
        <polygon id="src" points="50,35 130,35 85,79 45,79" />
        <circle id="volume-control" cx="149" cy="109" r="46" />
        <polygon id="track-prev" points="195,165 165,183 225,183 225,165" />
        <polygon id="track-next" points="225,165 225,183 258,183 272,165" />
        <polygon id="folder-up" points="302,165 289,183 317,183 330,165" />
        <polygon id="folder-down" points="352,165 339,183 367,183 380,165" />
        <polygon id="play-pause" points="460,165 445,183 473,183 488,165" />
        <polygon id="shuffle" points="517,165 503,183 530,183 545,165" />
        <polygon id="loop" points="567,165 552,183 580,183 595,165" />
      </svg>
    </div>
  </body>
  <script src="./js/utils.js"></script>
  <script src="./js/screenController.js"></script>
  <script src="./js/audioController.js"></script>
  <script src="./js/app.js"></script>
</html>
